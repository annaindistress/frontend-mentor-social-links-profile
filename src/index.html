<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon.png"
    />
    <link rel="stylesheet" href="/styles/style.css" />
    <title>Frontend Mentor | Social links profile</title>
    <meta
      name="description"
      content="Social links profile on Frontend Mentor"
    />
  </head>
  <body class="page">
    <main class="page__main">
      <h1 class="sr-only">Social links profile on Frontend Mentor</h1>
      <section class="card">
        <img
          class="card__avatar"
          src="/images/avatar-jessica.jpeg"
          alt=""
          width="88"
          height="88"
        />
        <h2 class="card__name">Jessica Randall</h2>
        <p class="card__location">London, United Kingdom</p>
        <p class="card__bio">Front-end developer and avid reader.</p>
        <ul class="card__links">
          <li>
            <a
              class="card__link"
              href="https://github.com"
              target="_blank"
              rel="noopener noreferrer"
            >
              GitHub</a
            >
          </li>
          <li>
            <a
              class="card__link"
              href="https://www.frontendmentor.io"
              target="_blank"
              rel="noopener noreferrer"
              >Frontend Mentor</a
            >
          </li>
          <li>
            <a
              class="card__link"
              href="https://www.linkedin.com"
              target="_blank"
              rel="noopener noreferrer"
              >LinkedIn</a
            >
          </li>
          <li>
            <a
              class="card__link"
              href="https://twitter.com"
              target="_blank"
              rel="noopener noreferrer"
              >Twitter</a
            >
          </li>
          <li>
            <a
              class="card__link"
              href="https://www.instagram.com"
              target="_blank"
              rel="noopener noreferrer"
              >Instagram</a
            >
          </li>
        </ul>
      </section>
    </main>
    <footer class="page__footer">
      <p class="page__copyright">
        Challenge by
        <a
          class="page__link"
          href="https://www.frontendmentor.io"
          target="_blank"
          rel="noopener noreferrer"
          >Frontend Mentor</a
        >. Coded by
        <a
          class="page__link"
          href="https://www.frontendmentor.io/profile/annaindistress"
          target="_blank"
          >annaindistress</a
        >.
      </p>
    </footer>
  </body>
</html>
